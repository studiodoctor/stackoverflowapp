name: CI / CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Build signed release APK'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.7'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Regenerate Gradle wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace -Pandroid.suppressUnsupportedCompileSdk=35

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Unit Tests + Coverage
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Regenerate Gradle wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace -Pandroid.suppressUnsupportedCompileSdk=35

      - name: Generate JaCoCo coverage report
        if: always()
        run: ./gradlew jacocoTestReport --stacktrace

      - name: Upload test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-xml
          path: app/build/test-results/testDebugUnitTest/
          retention-days: 14

      - name: Upload test results (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-html
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: app/build/reports/jacoco/jacocoTestReport/html/
          retention-days: 14

      - name: Upload coverage report (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-xml
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          retention-days: 14

      - name: Check test results exist
        id: check-results
        if: always()
        run: |
          if compgen -G "app/build/test-results/testDebugUnitTest/*.xml" > /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish test summary
        uses: dorny/test-reporter@v1
        if: always() && steps.check-results.outputs.found == 'true'
        with:
          name: Unit Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Debug Build
  # ─────────────────────────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ lint, unit-tests ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Regenerate Gradle wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace -Pandroid.suppressUnsupportedCompileSdk=35

      - name: Rename APK with short commit SHA
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/stackoverflow-search-debug-${GITHUB_SHA::8}.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/stackoverflow-search-debug-*.apk
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Release APK  (main branch push OR manual trigger)
  # ─────────────────────────────────────────────────────────────────────────────
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [ lint, unit-tests ]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.build_release == true)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: true

      - name: Regenerate Gradle wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --stacktrace

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "1.0")
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/stackoverflow-search-v${{ steps.version.outputs.name }}.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/stackoverflow-search-v${{ steps.version.outputs.name }}.apk
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: rm -f app/release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-${{ github.run_number }}
          name: "Release v${{ steps.version.outputs.name }} (build ${{ github.run_number }})"
          body: |
            ## StackOverflow Search App — v${{ steps.version.outputs.name }}

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Build:** `#${{ github.run_number }}`

            ### Status
            - Lint checks passed
            - All unit tests passed
            - Signed with release keystore

            ### Install
            Download the APK below and run:
            ```bash
            adb install stackoverflow-search-v${{ steps.version.outputs.name }}.apk
            ```
          files: app/build/outputs/apk/release/stackoverflow-search-v${{ steps.version.outputs.name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}